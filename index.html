<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#faf9f7">
<title>Daily Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
--bg:#faf9f7;--card:#fff;--border:#e8e6e1;--bh:#d0cec9;
--t1:#1a1a18;--t2:#6b6a66;--t3:#9c9b97;
--ac:#3d6bdb;--ac-bg:#eaf0fc;--ac-t:#2a4fa0;
--gn:#1d9e75;--gn-bg:#e1f5ee;--gn-t:#0f6e56;
--rd:#e24b4a;--rd-bg:#fcebeb;--rd-t:#a32d2d;
--r:10px;--rl:14px;
--f:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
}
@media(prefers-color-scheme:dark){:root{
--bg:#1a1a18;--card:#242422;--border:#3a3a37;--bh:#4a4a46;
--t1:#e8e6e1;--t2:#9c9b97;--t3:#6b6a66;
--ac:#6b9aff;--ac-bg:#1e2a44;--ac-t:#8db4ff;
--gn:#5dcaa5;--gn-bg:#0e2e24;--gn-t:#5dcaa5;
--rd:#f09595;--rd-bg:#3a1a1a;--rd-t:#f09595;
}}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:var(--f);background:var(--bg);color:var(--t1);line-height:1.6;
  min-height:100vh;min-height:100dvh;padding:0 16px 80px;max-width:480px;margin:0 auto}
h1{font-size:20px;font-weight:600;padding:20px 0 4px;letter-spacing:-0.3px}
.sub{font-size:12px;color:var(--t3);margin-bottom:16px}

.tabs{display:flex;gap:6px;margin-bottom:16px;position:sticky;top:0;z-index:10;background:var(--bg);padding:10px 0 8px}
.tab{flex:1;text-align:center;padding:8px 0;font-size:14px;font-weight:500;
  border:1px solid var(--border);border-radius:var(--r);background:var(--card);
  color:var(--t2);cursor:pointer;font-family:var(--f);transition:all .15s}
.tab.on{background:var(--ac-bg);color:var(--ac-t);border-color:var(--ac)}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:12px}
.fl{font-size:12px;color:var(--t2);margin-bottom:6px;font-weight:500}
.fr{margin-bottom:16px}

.B{padding:6px 12px;font-size:13px;border:2px solid var(--border);border-radius:var(--r);
  background:var(--card);color:var(--t2);cursor:pointer;font-family:var(--f);transition:all .12s;
  -webkit-tap-highlight-color:transparent}
.B:active{transform:scale(0.96)}

.meals{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.meals>div{min-width:0}
.ml{font-size:11px;color:var(--t3);margin-bottom:4px;font-weight:500}
.meals .bg{display:flex;flex-direction:column;gap:4px}
.meals .B{text-align:center;padding:5px 0;font-size:12px}
.sub-opts{margin-top:4px;display:flex;flex-direction:column;gap:3px}
.sub-opts .B{font-size:11px;padding:4px 0;text-align:center;background:var(--bg)}
.other-in{margin-top:3px}
.other-in input{width:100%;max-width:100%;font-size:12px;padding:5px 8px;border:1px solid var(--border);
  border-radius:var(--r);background:var(--card);color:var(--t1);font-family:var(--f)}

.extra{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.cof-section{display:flex;flex-direction:column;gap:8px}
.cof-row{display:flex;align-items:center;gap:8px}
.cof-label{font-size:12px;color:var(--t2);min-width:36px}
.cof-picks{display:flex;gap:4px}
.cof-picks .B{padding:4px 10px;font-size:12px;min-width:28px;text-align:center}

.slider-wrap{margin-bottom:2px}
.slider-top{display:flex;justify-content:space-between;align-items:baseline}
.slider-v{font-size:18px;font-weight:600;color:var(--ac)}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;
  background:var(--border);outline:none;margin:8px 0 4px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;
  border-radius:50%;background:var(--ac);cursor:pointer;border:3px solid var(--card);
  box-shadow:0 1px 4px rgba(0,0,0,.15)}
.range-foot{display:flex;justify-content:space-between;font-size:11px;color:var(--t3)}

input[type=date],input[type=text],textarea{width:100%;max-width:100%;font-size:14px;padding:8px 10px;
  border:1px solid var(--border);border-radius:var(--r);background:var(--card);
  color:var(--t1);font-family:var(--f);transition:border .15s}
input:focus,textarea:focus{outline:none;border-color:var(--ac)}
textarea{min-height:72px;resize:vertical;line-height:1.5}

.bowel-row{display:flex;gap:3px;flex-wrap:nowrap}
.bowel-row .B{flex:1;text-align:center;padding:5px 0;font-size:12px}

.acts{display:flex;gap:8px;margin-top:16px}
.abtn{flex:1;padding:12px;text-align:center;font-size:14px;font-weight:500;
  border-radius:var(--r);cursor:pointer;font-family:var(--f);border:none;transition:all .15s}
.abtn:active{transform:scale(0.97)}
.abtn-p{background:var(--ac);color:#fff}
.abtn-o{background:var(--card);color:var(--t2);border:1px solid var(--border)}

.hi{padding:14px 0;border-bottom:1px solid var(--border)}
.hi:last-child{border-bottom:none}
.hi-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.hi-date{font-weight:600;font-size:15px}
.hi-acts{display:flex;gap:6px}
.hi-acts button{padding:3px 10px;font-size:11px;border-radius:6px;cursor:pointer;
  font-family:var(--f);border:1px solid var(--border);background:var(--card);color:var(--t2)}
.hi-acts .del{border-color:var(--rd);color:var(--rd-t);background:var(--rd-bg)}
.hd{font-size:12px;color:var(--t2);line-height:1.8}
.hd span{display:inline-block;margin-right:10px}
.tag{display:inline-block;padding:1px 8px;border-radius:6px;font-size:11px;
  background:var(--ac-bg);color:var(--ac-t);margin-right:4px}
.empty{text-align:center;color:var(--t3);padding:40px 0;font-size:14px}

.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:14px}
.sc-l{font-size:11px;color:var(--t2);font-weight:500}
.sc-v{font-size:22px;font-weight:600;margin-top:2px}

.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-lbl{font-size:12px;min-width:32px;color:var(--t2)}
.bar-bg{flex:1;height:14px;background:var(--border);border-radius:7px;overflow:hidden}
.bar-fill{height:100%;border-radius:7px;transition:width .3s}
.bar-n{font-size:11px;color:var(--t3);min-width:20px;text-align:right}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);
  padding:10px 24px;border-radius:var(--r);font-size:13px;font-weight:500;
  z-index:99;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.toast.ok{background:var(--gn-bg);color:var(--gn-t);border:1px solid var(--gn)}
.toast.err{background:var(--rd-bg);color:var(--rd-t);border:1px solid var(--rd)}

.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.rec-count{font-size:13px;color:var(--t3)}
.top-acts{display:flex;gap:6px}
.btn-d{background:var(--rd-bg);color:var(--rd-t);border:1px solid var(--rd);border-radius:var(--r);
  padding:6px 14px;font-size:12px;cursor:pointer;font-family:var(--f)}
.btn-ex{background:var(--card);color:var(--t2);border:1px solid var(--border);border-radius:var(--r);
  padding:6px 14px;font-size:12px;cursor:pointer;font-family:var(--f)}
</style>
</head>
<body>
<h1>Daily Log</h1>
<div class="sub" id="status"></div>

<div class="tabs">
<button class="tab on" onclick="showTab('input')">记录</button>
<button class="tab" onclick="showTab('history')">历史</button>
<button class="tab" onclick="showTab('stats')">统计</button>
</div>

<div id="tab-input">
<div class="card">
  <div class="fr"><div class="fl">日期</div><input type="date" id="f-date"></div>

  <div class="fr">
    <div class="fl">三餐</div>
    <div class="meals">
      <div><div class="ml">早餐</div><div class="bg" id="pk-bf"></div><div id="sub-bf"></div></div>
      <div><div class="ml">午餐</div><div class="bg" id="pk-lu"></div><div id="sub-lu"></div></div>
      <div><div class="ml">晚餐</div><div class="bg" id="pk-di"></div><div id="sub-di"></div></div>
    </div>
  </div>

  <div class="fr">
    <div class="extra">
      <div><div class="fl">麻辣烫</div><div style="display:flex;gap:5px" id="pk-mlt"></div></div>
      <div>
        <div class="fl">咖啡</div>
        <div class="cof-section">
          <div class="cof-row"><span class="cof-label">拿铁</span><div class="cof-picks" id="pk-latte"></div></div>
          <div class="cof-row"><span class="cof-label">美式</span><div class="cof-picks" id="pk-amer"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="fr"><div class="slider-wrap">
    <div class="slider-top"><span class="fl">睡眠</span><span class="slider-v" id="v-sleep">7.0h</span></div>
    <input type="range" id="f-sleep" min="0" max="12" step="0.5" value="7">
    <div class="range-foot"><span>0</span><span>12h</span></div>
  </div></div>

  <div class="fr"><div class="slider-wrap">
    <div class="slider-top"><span class="fl">运动</span><span class="slider-v" id="v-ex">0.0h</span></div>
    <input type="range" id="f-ex" min="0" max="4" step="0.5" value="0">
    <div class="range-foot"><span>0</span><span>4h</span></div>
  </div></div>

  <div class="fr"><div class="fl">排便</div><div class="bowel-row" id="pk-bowel"></div></div>

  <div class="fr"><div class="fl">研究进度 / 笔记</div>
    <textarea id="f-research" placeholder="今天做了什么..."></textarea></div>

  <div class="fr"><div class="slider-wrap">
    <div class="slider-top"><span class="fl">身体 / 心情</span><span class="slider-v" id="v-mood">4</span></div>
    <input type="range" id="f-mood" min="1" max="8" step="1" value="4">
    <div class="range-foot"><span>1 差</span><span>8 好</span></div>
  </div></div>

  <div class="fr"><div class="fl">补充说明</div>
    <input type="text" id="f-note" placeholder="可选..."></div>

  <div class="acts">
    <button class="abtn abtn-o" onclick="clearForm()">清空</button>
    <button class="abtn abtn-p" onclick="saveEntry()">保存</button>
  </div>
</div>
</div>

<div id="tab-history" style="display:none">
  <div class="top-bar">
    <span class="rec-count" id="rec-count"></span>
    <div class="top-acts">
      <button class="btn-ex" onclick="exportCSV()">导出CSV</button>
      <button class="btn-d" onclick="clearAll()">清空</button>
    </div>
  </div>
  <div id="hlist"></div>
</div>

<div id="tab-stats" style="display:none"><div id="stats-c"></div></div>

<div class="toast" id="toast"></div>

<script>
var KEY='dailylog_data';
var BOWELS=['正常','偏软','偏硬','腹泻','便秘','未排'];
var MEAL_OPTS={bf:['食堂','咖啡厅','其他'],lu:['食堂','外卖','其他'],di:['食堂','外卖','其他']};
var SUB_OPTS={'bf_咖啡厅':['甜点','三明治','其他'],'lu_外卖':['轻食','中餐','韩餐','其他'],'di_外卖':['轻食','中餐','韩餐','其他']};
var entries=[];
var sel={bf:'',lu:'',di:'',bfSub:'',luSub:'',diSub:'',bfOther:'',luOther:'',diOther:'',mlt:'',latte:'',amer:'',bowel:''};

var SEL_STYLE='background:var(--ac);color:#fff;border-color:var(--ac)';
var GN_STYLE='background:var(--gn);color:#fff;border-color:var(--gn)';
var RD_STYLE='background:var(--rd);color:#fff;border-color:var(--rd)';
var DEF_STYLE='background:var(--card);color:var(--t2);border-color:var(--border)';

function $(id){return document.getElementById(id);}
function today(){return new Date().toISOString().slice(0,10);}
function esc(s){return(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function mark(btn,on,type){
  if(on){
    btn.style.cssText=type==='gn'?GN_STYLE:type==='rd'?RD_STYLE:SEL_STYLE;
  }else{
    btn.style.cssText=DEF_STYLE;
  }
}

function init(){
  $('f-date').value=today();
  ['bf','lu','di'].forEach(function(k){
    var c=$('pk-'+k);
    MEAL_OPTS[k].forEach(function(v){
      var b=document.createElement('button');b.className='B';b.textContent=v;
      b.onclick=function(){sel[k]=v;sel[k+'Sub']='';sel[k+'Other']='';updMeal(k);};
      c.appendChild(b);
    });
  });
  ['O','X'].forEach(function(v){
    var b=document.createElement('button');b.className='B';b.textContent=v;
    b.onclick=function(){sel.mlt=v;updMlt();};
    $('pk-mlt').appendChild(b);
  });
  [0,1,2].forEach(function(v){
    var b1=document.createElement('button');b1.className='B';b1.textContent=v;
    b1.onclick=function(){sel.latte=String(v);updCof('latte');};
    $('pk-latte').appendChild(b1);
    var b2=document.createElement('button');b2.className='B';b2.textContent=v;
    b2.onclick=function(){sel.amer=String(v);updCof('amer');};
    $('pk-amer').appendChild(b2);
  });
  BOWELS.forEach(function(v){
    var b=document.createElement('button');b.className='B';b.textContent=v;
    b.onclick=function(){sel.bowel=v;updBowel();};
    $('pk-bowel').appendChild(b);
  });
  $('f-mood').oninput=function(e){$('v-mood').textContent=e.target.value;};
  $('f-sleep').oninput=function(e){$('v-sleep').textContent=parseFloat(e.target.value).toFixed(1)+'h';};
  $('f-ex').oninput=function(e){$('v-ex').textContent=parseFloat(e.target.value).toFixed(1)+'h';};
  loadData();
}

function updMeal(k){
  var btns=$('pk-'+k).querySelectorAll('.B');
  btns.forEach(function(b){mark(b,b.textContent===sel[k]);});
  var subC=$('sub-'+k);subC.innerHTML='';
  var subKey=k+'_'+sel[k];
  if(SUB_OPTS[subKey]){
    var d=document.createElement('div');d.className='sub-opts';
    SUB_OPTS[subKey].forEach(function(v){
      var b=document.createElement('button');b.className='B';b.textContent=v;
      b.onclick=function(){sel[k+'Sub']=v;sel[k+'Other']='';updSubHL(d,v,k);};
      d.appendChild(b);
    });
    subC.appendChild(d);
    if(SUB_OPTS[subKey].indexOf('其他')>=0){
      var oi=document.createElement('div');oi.className='other-in';oi.style.display='none';
      oi.innerHTML='<input type="text" placeholder="...">';
      oi.querySelector('input').oninput=function(e){sel[k+'Other']=e.target.value;};
      subC.appendChild(oi);
    }
    if(sel[k+'Sub'])updSubHL(d,sel[k+'Sub'],k);
  }else if(sel[k]==='其他'){
    var oi=document.createElement('div');oi.className='other-in';
    oi.innerHTML='<input type="text" placeholder="...">';
    oi.querySelector('input').value=sel[k+'Other']||'';
    oi.querySelector('input').oninput=function(e){sel[k+'Other']=e.target.value;};
    subC.appendChild(oi);
  }
}
function updSubHL(container,val,k){
  container.querySelectorAll('.B').forEach(function(b){mark(b,b.textContent===val);});
  var oi=container.parentElement.querySelector('.other-in');
  if(oi)oi.style.display=val==='其他'?'block':'none';
}
function updMlt(){
  $('pk-mlt').querySelectorAll('.B').forEach(function(b){
    var on=b.textContent===sel.mlt;
    mark(b,on,on?(sel.mlt==='O'?'gn':'rd'):'');
  });
}
function updCof(t){
  $('pk-'+t).querySelectorAll('.B').forEach(function(b){mark(b,b.textContent===sel[t]);});
}
function updBowel(){
  $('pk-bowel').querySelectorAll('.B').forEach(function(b){mark(b,b.textContent===sel.bowel);});
}

function mealResult(k){
  var main=sel[k];if(!main)return '';
  var sub=sel[k+'Sub'];var other=sel[k+'Other'];
  if(main==='其他')return other||'其他';
  if(sub==='其他')return main+'('+(other||'其他')+')';
  if(sub)return main+'('+sub+')';
  return main;
}

function loadData(){
  try{var d=localStorage.getItem(KEY);if(d)entries=JSON.parse(d);}catch(e){entries=[];}
  $('status').textContent=entries.length+' 条记录';
  renderHistory();
}
function saveData(){
  try{localStorage.setItem(KEY,JSON.stringify(entries));}catch(e){}
  $('status').textContent=entries.length+' 条记录';
}

function saveEntry(){
  var date=$('f-date').value;
  if(!date){toast('请选择日期',true);return;}
  var entry={date:date,breakfast:mealResult('bf'),lunch:mealResult('lu'),dinner:mealResult('di'),
    mlt:sel.mlt,latte:sel.latte,amer:sel.amer,
    sleep:parseFloat($('f-sleep').value),exercise:parseFloat($('f-ex').value),
    bowel:sel.bowel,research:$('f-research').value,
    mood:parseInt($('f-mood').value),moodNote:$('f-note').value,ts:Date.now()};
  var idx=-1;
  for(var i=0;i<entries.length;i++){if(entries[i].date===date){idx=i;break;}}
  if(idx>=0)entries[idx]=entry;else entries.push(entry);
  entries.sort(function(a,b){return(b.date||'').localeCompare(a.date||'');});
  saveData();renderHistory();clearForm();
  toast('已保存 '+date,false);
}

function clearForm(){
  $('f-date').value=today();
  sel={bf:'',lu:'',di:'',bfSub:'',luSub:'',diSub:'',bfOther:'',luOther:'',diOther:'',mlt:'',latte:'',amer:'',bowel:''};
  ['bf','lu','di'].forEach(function(k){updMeal(k);});
  updMlt();updCof('latte');updCof('amer');updBowel();
  $('f-mood').value=4;$('v-mood').textContent='4';
  $('f-sleep').value=7;$('v-sleep').textContent='7.0h';
  $('f-ex').value=0;$('v-ex').textContent='0.0h';
  $('f-note').value='';$('f-research').value='';
}

function showTab(name){
  ['input','history','stats'].forEach(function(t){$('tab-'+t).style.display=t===name?'block':'none';});
  var tabs=document.querySelectorAll('.tab');
  var names=['input','history','stats'];
  tabs.forEach(function(b,i){
    if(names[i]===name)b.classList.add('on');else b.classList.remove('on');
  });
  if(name==='history')renderHistory();
  if(name==='stats')renderStats();
}

function renderHistory(){
  var c=$('hlist');$('rec-count').textContent=entries.length+' 条';
  if(!entries.length){c.innerHTML='<div class="empty">暂无记录</div>';return;}
  var html='';
  for(var i=0;i<entries.length;i++){
    var e=entries[i];
    var cofStr=[];
    if(e.latte&&e.latte!=='0')cofStr.push('拿铁'+e.latte);
    if(e.amer&&e.amer!=='0')cofStr.push('美式'+e.amer);
    html+='<div class="hi"><div class="hi-top"><div class="hi-date">'+e.date+'</div>';
    html+='<div class="hi-acts"><button onclick="editEntry('+i+')">编辑</button><button class="del" onclick="delEntry('+i+')">删除</button></div></div>';
    html+='<div class="hd">';
    html+='<span class="tag">心情'+(e.mood||'—')+'/8</span>';
    html+='<span class="tag">睡'+(typeof e.sleep==='number'?Number(e.sleep).toFixed(1):'—')+'h</span>';
    if(e.exercise>0)html+='<span class="tag">动'+Number(e.exercise).toFixed(1)+'h</span>';
    if(e.bowel)html+='<span class="tag">'+e.bowel+'</span>';
    if(e.mlt==='O')html+='<span class="tag">麻辣烫</span>';
    if(cofStr.length)html+='<span class="tag">'+cofStr.join(' ')+'</span>';
    html+='</div><div class="hd">';
    if(e.breakfast)html+='<span>早:'+esc(e.breakfast)+'</span>';
    if(e.lunch)html+='<span>午:'+esc(e.lunch)+'</span>';
    if(e.dinner)html+='<span>晚:'+esc(e.dinner)+'</span>';
    html+='</div>';
    if(e.research)html+='<div class="hd" style="margin-top:2px;color:var(--t1)">'+esc(e.research).slice(0,100)+(e.research.length>100?'...':'')+'</div>';
    html+='</div>';
  }
  c.innerHTML=html;
}

function editEntry(i){
  var e=entries[i];showTab('input');$('f-date').value=e.date;
  sel={bf:'',lu:'',di:'',bfSub:'',luSub:'',diSub:'',bfOther:'',luOther:'',diOther:'',
    mlt:e.mlt||'',latte:e.latte!=null?String(e.latte):'',amer:e.amer!=null?String(e.amer):'',bowel:e.bowel||''};
  ['bf','lu','di'].forEach(function(k){
    var fld=k==='bf'?'breakfast':k==='lu'?'lunch':'dinner';
    var raw=e[fld]||'';
    var m=raw.match(/^(.+?)\((.+)\)$/);
    if(m){sel[k]=m[1];var sub=m[2];
      var subKey=k+'_'+m[1];
      if(SUB_OPTS[subKey]&&SUB_OPTS[subKey].indexOf(sub)>=0){sel[k+'Sub']=sub;}
      else if(SUB_OPTS[subKey]){sel[k+'Sub']='其他';sel[k+'Other']=sub;}
      else{sel[k]='其他';sel[k+'Other']=raw;}
    }else if(MEAL_OPTS[k].indexOf(raw)>=0){sel[k]=raw;}
    else if(raw){sel[k]='其他';sel[k+'Other']=raw;}
    updMeal(k);
    if(sel[k+'Other']){var oi=$('sub-'+k).querySelector('.other-in input');if(oi)oi.value=sel[k+'Other'];}
  });
  updMlt();updCof('latte');updCof('amer');updBowel();
  $('f-mood').value=e.mood||4;$('v-mood').textContent=e.mood||4;
  $('f-note').value=e.moodNote||'';
  $('f-sleep').value=typeof e.sleep==='number'?e.sleep:7;
  $('v-sleep').textContent=(typeof e.sleep==='number'?Number(e.sleep):7).toFixed(1)+'h';
  $('f-ex').value=typeof e.exercise==='number'?e.exercise:0;
  $('v-ex').textContent=(typeof e.exercise==='number'?Number(e.exercise):0).toFixed(1)+'h';
  $('f-research').value=e.research||'';
  window.scrollTo(0,0);
}

function delEntry(i){if(!confirm('删除 '+entries[i].date+'？'))return;entries.splice(i,1);saveData();renderHistory();toast('已删除',false);}
function clearAll(){if(!confirm('清空所有记录？不可撤销。'))return;entries=[];saveData();renderHistory();}

function renderStats(){
  var c=$('stats-c');if(!entries.length){c.innerHTML='<div class="empty">暂无数据</div>';return;}
  var sl=entries.filter(function(e){return typeof e.sleep==='number';});
  var avgSl=sl.length?sl.reduce(function(a,b){return a+b.sleep;},0)/sl.length:0;
  var mo=entries.filter(function(e){return typeof e.mood==='number';});
  var avgMo=mo.length?mo.reduce(function(a,b){return a+b.mood;},0)/mo.length:0;
  var exD=entries.filter(function(e){return e.exercise>0;}).length;
  var mltD=entries.filter(function(e){return e.mlt==='O';}).length;
  var latA=entries.filter(function(e){return e.latte;}).map(function(e){return parseInt(e.latte);});
  var avgLat=latA.length?latA.reduce(function(a,b){return a+b;},0)/latA.length:0;
  var amA=entries.filter(function(e){return e.amer;}).map(function(e){return parseInt(e.amer);});
  var avgAm=amA.length?amA.reduce(function(a,b){return a+b;},0)/amA.length:0;
  var bowelC={};entries.forEach(function(e){if(e.bowel)bowelC[e.bowel]=(bowelC[e.bowel]||0)+1;});
  var moodC={};entries.forEach(function(e){if(typeof e.mood==='number')moodC[e.mood]=(moodC[e.mood]||0)+1;});
  var h='<div class="sg">';
  h+='<div class="sc"><div class="sc-l">总记录</div><div class="sc-v">'+entries.length+'天</div></div>';
  h+='<div class="sc"><div class="sc-l">平均心情</div><div class="sc-v">'+avgMo.toFixed(1)+'/8</div></div>';
  h+='<div class="sc"><div class="sc-l">平均睡眠</div><div class="sc-v">'+avgSl.toFixed(1)+'h</div></div>';
  h+='<div class="sc"><div class="sc-l">运动天数</div><div class="sc-v">'+exD+'天</div></div>';
  h+='<div class="sc"><div class="sc-l">麻辣烫</div><div class="sc-v">'+mltD+'天</div></div>';
  h+='<div class="sc"><div class="sc-l">日均拿铁</div><div class="sc-v">'+avgLat.toFixed(1)+'杯</div></div>';
  h+='<div class="sc"><div class="sc-l">日均美式</div><div class="sc-v">'+avgAm.toFixed(1)+'杯</div></div>';
  h+='<div class="sc"><div class="sc-l">日均咖啡总</div><div class="sc-v">'+(avgLat+avgAm).toFixed(1)+'杯</div></div>';
  h+='</div>';
  h+='<div class="card"><div class="fl" style="margin-bottom:10px">排便分布</div>';
  var bk=Object.keys(bowelC);
  for(var j=0;j<bk.length;j++){var k=bk[j];var v=bowelC[k];
    h+='<div class="bar-row"><span class="bar-lbl">'+k+'</span><div class="bar-bg"><div class="bar-fill" style="width:'+Math.round(v/entries.length*100)+'%;background:var(--ac)"></div></div><span class="bar-n">'+v+'</span></div>';}
  h+='</div>';
  h+='<div class="card"><div class="fl" style="margin-bottom:10px">心情分布</div>';
  for(var m=1;m<=8;m++){var v=moodC[m]||0;
    h+='<div class="bar-row"><span class="bar-lbl">'+m+'</span><div class="bar-bg"><div class="bar-fill" style="width:'+(entries.length?Math.round(v/entries.length*100):0)+'%;background:var(--gn)"></div></div><span class="bar-n">'+v+'</span></div>';}
  h+='</div>';
  c.innerHTML=h;
}

function exportCSV(){
  if(!entries.length){toast('没有记录',true);return;}
  var hdr=['日期','早餐','午餐','晚餐','麻辣烫','拿铁','美式','睡眠h','运动h','排便','研究进度','心情','补充说明'];
  var rows=entries.map(function(e){
    return[e.date,e.breakfast,e.lunch,e.dinner,e.mlt,e.latte,e.amer,
      e.sleep,e.exercise,e.bowel,'"'+(e.research||'').replace(/"/g,'""')+'"',e.mood,e.moodNote].join(',');
  });
  var csv='\uFEFF'+hdr.join(',')+'\n'+rows.join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='dailylog_'+today()+'.csv';a.click();
  toast('已导出',false);
}

function toast(msg,isErr){
  var t=$('toast');t.textContent=msg;
  t.className='toast show '+(isErr?'err':'ok');
  setTimeout(function(){t.className='toast';},2000);
}

init();
</script>
</body>
